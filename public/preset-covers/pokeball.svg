<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2d3561"/>
      <stop offset="100%" stop-color="#0f0f23"/>
    </radialGradient>
    <radialGradient id="ballTop" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </radialGradient>
    <radialGradient id="ballBottom" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d5d8dc"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="280" fill="url(#bg)"/>
  <!-- Subtle dot pattern -->
  <circle cx="20" cy="20" r="1.5" fill="rgba(255,255,255,0.08)"/>
  <circle cx="60" cy="40" r="1" fill="rgba(255,255,255,0.06)"/>
  <circle cx="150" cy="30" r="1.5" fill="rgba(255,255,255,0.08)"/>
  <circle cx="180" cy="60" r="1" fill="rgba(255,255,255,0.06)"/>
  <circle cx="30" cy="240" r="1.5" fill="rgba(255,255,255,0.08)"/>
  <circle cx="170" cy="250" r="1" fill="rgba(255,255,255,0.06)"/>
  <!-- Ball shadow -->
  <ellipse cx="100" cy="158" rx="68" ry="8" fill="rgba(0,0,0,0.3)"/>
  <!-- Ball top half (red) -->
  <path d="M 28 138 A 72 72 0 0 1 172 138 Z" fill="url(#ballTop)"/>
  <!-- Ball bottom half (white) -->
  <path d="M 28 138 A 72 72 0 0 0 172 138 Z" fill="url(#ballBottom)"/>
  <!-- Outer circle border -->
  <circle cx="100" cy="138" r="72" fill="none" stroke="#1a1a2e" stroke-width="4"/>
  <!-- Center band -->
  <rect x="28" y="131" width="144" height="14" fill="#1a1a2e"/>
  <!-- Center button outer -->
  <circle cx="100" cy="138" r="22" fill="#1a1a2e"/>
  <!-- Center button ring -->
  <circle cx="100" cy="138" r="16" fill="#e8e8e8"/>
  <!-- Center button inner -->
  <circle cx="100" cy="138" r="10" fill="#c8c8c8"/>
  <!-- Highlight on ball -->
  <ellipse cx="75" cy="108" rx="14" ry="9" fill="rgba(255,255,255,0.25)" transform="rotate(-20 75 108)"/>
  <!-- Title text -->
  <text x="100" y="235" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="3">POKÉBALL</text>
</svg>
