<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <defs>
    <radialGradient id="gbg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a3a6b"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
    <radialGradient id="gbtop" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#5dade2"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </radialGradient>
    <radialGradient id="gbbottom" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d5d8dc"/>
    </radialGradient>
  </defs>
  <rect width="200" height="280" fill="url(#gbg)"/>
  <!-- Subtle stars -->
  <circle cx="30" cy="30" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="165" cy="45" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="180" cy="240" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <!-- Shadow -->
  <ellipse cx="100" cy="158" rx="68" ry="8" fill="rgba(0,0,0,0.4)"/>
  <!-- Ball top (blue) -->
  <path d="M 28 138 A 72 72 0 0 1 172 138 Z" fill="url(#gbtop)"/>
  <!-- Red triangle accents on top -->
  <polygon points="72,138 100,95 128,138" fill="#e74c3c" opacity="0.85"/>
  <!-- Ball bottom (white) -->
  <path d="M 28 138 A 72 72 0 0 0 172 138 Z" fill="url(#gbbottom)"/>
  <!-- Outer border -->
  <circle cx="100" cy="138" r="72" fill="none" stroke="#0a1628" stroke-width="4"/>
  <!-- Center band -->
  <rect x="28" y="131" width="144" height="14" fill="#0a1628"/>
  <!-- Center button -->
  <circle cx="100" cy="138" r="22" fill="#0a1628"/>
  <circle cx="100" cy="138" r="16" fill="#aed6f1"/>
  <circle cx="100" cy="138" r="10" fill="#5dade2"/>
  <!-- Highlight -->
  <ellipse cx="75" cy="108" rx="14" ry="9" fill="rgba(255,255,255,0.25)" transform="rotate(-20 75 108)"/>
  <text x="100" y="235" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="3">GREAT BALL</text>
</svg>
