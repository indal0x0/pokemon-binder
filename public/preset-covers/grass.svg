<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <defs>
    <linearGradient id="grassbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d2b0d"/>
      <stop offset="100%" stop-color="#1a4a1a"/>
    </linearGradient>
    <radialGradient id="grassglow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(100,220,100,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="200" height="280" fill="url(#grassbg)"/>
  <rect width="200" height="280" fill="url(#grassglow)"/>
  <!-- Background leaves -->
  <ellipse cx="30" cy="200" rx="20" ry="60" fill="#2d7a2d" opacity="0.5" transform="rotate(-30 30 200)"/>
  <ellipse cx="170" cy="210" rx="20" ry="55" fill="#2d7a2d" opacity="0.5" transform="rotate(30 170 210)"/>
  <ellipse cx="15" cy="160" rx="15" ry="45" fill="#388e3c" opacity="0.4" transform="rotate(-45 15 160)"/>
  <ellipse cx="185" cy="170" rx="15" ry="45" fill="#388e3c" opacity="0.4" transform="rotate(45 185 170)"/>
  <!-- Main leaf center -->
  <ellipse cx="100" cy="130" rx="45" ry="70" fill="#4caf50" transform="rotate(0 100 130)"/>
  <!-- Leaf vein -->
  <line x1="100" y1="65" x2="100" y2="195" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <line x1="100" y1="100" x2="68" y2="130" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="100" y1="110" x2="132" y2="140" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="100" y1="130" x2="63" y2="155" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="100" y1="140" x2="137" y2="165" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Leaf shine -->
  <ellipse cx="82" cy="100" rx="12" ry="20" fill="rgba(255,255,255,0.15)" transform="rotate(-10 82 100)"/>
  <!-- Small accent leaves -->
  <ellipse cx="55" cy="95" rx="12" ry="25" fill="#66bb6a" opacity="0.7" transform="rotate(-40 55 95)"/>
  <ellipse cx="145" cy="100" rx="12" ry="25" fill="#66bb6a" opacity="0.7" transform="rotate(40 145 100)"/>
  <!-- Sparkle dots -->
  <circle cx="40" cy="50" r="2" fill="#a5d6a7" opacity="0.6"/>
  <circle cx="160" cy="45" r="1.5" fill="#a5d6a7" opacity="0.5"/>
  <circle cx="25" cy="120" r="1.5" fill="#a5d6a7" opacity="0.5"/>
  <circle cx="175" cy="130" r="2" fill="#a5d6a7" opacity="0.6"/>
  <text x="100" y="265" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="rgba(100,220,100,0.8)" text-anchor="middle" letter-spacing="4">GRASS</text>
</svg>
