<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <defs>
    <radialGradient id="mbg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#4a1580"/>
      <stop offset="100%" stop-color="#1a0030"/>
    </radialGradient>
    <radialGradient id="mball" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#6c3483"/>
    </radialGradient>
    <radialGradient id="mballw" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d5d8dc"/>
    </radialGradient>
  </defs>
  <rect width="200" height="280" fill="url(#mbg)"/>
  <!-- Stars -->
  <circle cx="25" cy="25" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="170" cy="35" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="45" cy="245" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="155" cy="255" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="185" cy="220" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="15" cy="200" r="1" fill="rgba(255,255,255,0.4)"/>
  <!-- Shadow -->
  <ellipse cx="100" cy="158" rx="68" ry="8" fill="rgba(0,0,0,0.4)"/>
  <!-- Ball top (purple) -->
  <path d="M 28 138 A 72 72 0 0 1 172 138 Z" fill="url(#mball)"/>
  <!-- Ball bottom (white) -->
  <path d="M 28 138 A 72 72 0 0 0 172 138 Z" fill="url(#mballw)"/>
  <!-- Outer border -->
  <circle cx="100" cy="138" r="72" fill="none" stroke="#1a0030" stroke-width="4"/>
  <!-- M decoration on top half -->
  <!-- Pink dots pattern -->
  <circle cx="65" cy="110" r="7" fill="#ff69b4" opacity="0.9"/>
  <circle cx="135" cy="110" r="7" fill="#ff69b4" opacity="0.9"/>
  <!-- M shape -->
  <path d="M 72 130 L 72 105 L 100 120 L 128 105 L 128 130" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="4" stroke-linejoin="round"/>
  <!-- Center band -->
  <rect x="28" y="131" width="144" height="14" fill="#1a0030"/>
  <!-- Center button -->
  <circle cx="100" cy="138" r="22" fill="#1a0030"/>
  <circle cx="100" cy="138" r="16" fill="#c39bd3"/>
  <circle cx="100" cy="138" r="10" fill="#9b59b6"/>
  <!-- Highlight -->
  <ellipse cx="75" cy="108" rx="14" ry="9" fill="rgba(255,255,255,0.2)" transform="rotate(-20 75 108)"/>
  <text x="100" y="235" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="3">MASTER BALL</text>
</svg>
