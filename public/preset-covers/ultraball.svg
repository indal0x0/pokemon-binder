<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <defs>
    <radialGradient id="ubg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2c2c2c"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="ubtop" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f9ca24"/>
      <stop offset="100%" stop-color="#f0932b"/>
    </radialGradient>
    <radialGradient id="ubbottom" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d5d8dc"/>
    </radialGradient>
  </defs>
  <rect width="200" height="280" fill="url(#ubg)"/>
  <!-- Gold accent lines -->
  <line x1="0" y1="15" x2="200" y2="15" stroke="rgba(249,202,36,0.2)" stroke-width="1"/>
  <line x1="0" y1="265" x2="200" y2="265" stroke="rgba(249,202,36,0.2)" stroke-width="1"/>
  <!-- Shadow -->
  <ellipse cx="100" cy="158" rx="68" ry="8" fill="rgba(0,0,0,0.5)"/>
  <!-- Ball top (yellow/gold) -->
  <path d="M 28 138 A 72 72 0 0 1 172 138 Z" fill="url(#ubtop)"/>
  <!-- Ball bottom (white) -->
  <path d="M 28 138 A 72 72 0 0 0 172 138 Z" fill="url(#ubbottom)"/>
  <!-- Outer border -->
  <circle cx="100" cy="138" r="72" fill="none" stroke="#0a0a0a" stroke-width="4"/>
  <!-- Black U-shaped decoration on top half -->
  <path d="M 68 125 Q 68 105 100 105 Q 132 105 132 125" fill="none" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
  <!-- Center band (black) -->
  <rect x="28" y="131" width="144" height="14" fill="#1a1a1a"/>
  <!-- Center button -->
  <circle cx="100" cy="138" r="22" fill="#1a1a1a"/>
  <circle cx="100" cy="138" r="16" fill="#f9ca24"/>
  <circle cx="100" cy="138" r="10" fill="#f0932b"/>
  <!-- Highlight -->
  <ellipse cx="75" cy="108" rx="14" ry="9" fill="rgba(255,255,255,0.25)" transform="rotate(-20 75 108)"/>
  <text x="100" y="235" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="rgba(249,202,36,0.7)" text-anchor="middle" letter-spacing="3">ULTRA BALL</text>
</svg>
