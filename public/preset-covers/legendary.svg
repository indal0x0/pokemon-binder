<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <defs>
    <radialGradient id="legbg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2a1500"/>
      <stop offset="100%" stop-color="#0a0500"/>
    </radialGradient>
    <radialGradient id="leggold" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="rgba(255,200,0,0.25)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="legcrown" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </radialGradient>
  </defs>
  <rect width="200" height="280" fill="url(#legbg)"/>
  <rect width="200" height="280" fill="url(#leggold)"/>
  <!-- Ornate border -->
  <rect x="8" y="8" width="184" height="264" rx="6" fill="none" stroke="rgba(212,175,55,0.5)" stroke-width="1.5"/>
  <rect x="12" y="12" width="176" height="256" rx="4" fill="none" stroke="rgba(212,175,55,0.25)" stroke-width="1"/>
  <!-- Corner ornaments -->
  <path d="M 8 30 Q 8 8 30 8" fill="none" stroke="rgba(212,175,55,0.6)" stroke-width="2"/>
  <path d="M 170 8 Q 192 8 192 30" fill="none" stroke="rgba(212,175,55,0.6)" stroke-width="2"/>
  <path d="M 8 250 Q 8 272 30 272" fill="none" stroke="rgba(212,175,55,0.6)" stroke-width="2"/>
  <path d="M 170 272 Q 192 272 192 250" fill="none" stroke="rgba(212,175,55,0.6)" stroke-width="2"/>
  <!-- Radiating lines from center -->
  <line x1="100" y1="130" x2="100" y2="30" stroke="rgba(212,175,55,0.1)" stroke-width="1"/>
  <line x1="100" y1="130" x2="20" y2="80" stroke="rgba(212,175,55,0.1)" stroke-width="1"/>
  <line x1="100" y1="130" x2="180" y2="80" stroke="rgba(212,175,55,0.1)" stroke-width="1"/>
  <line x1="100" y1="130" x2="20" y2="180" stroke="rgba(212,175,55,0.1)" stroke-width="1"/>
  <line x1="100" y1="130" x2="180" y2="180" stroke="rgba(212,175,55,0.1)" stroke-width="1"/>
  <line x1="100" y1="130" x2="100" y2="230" stroke="rgba(212,175,55,0.1)" stroke-width="1"/>
  <!-- Diamond/gem shape center -->
  <polygon points="100,65 130,130 100,195 70,130" fill="url(#legcrown)" opacity="0.85"/>
  <polygon points="100,65 130,130 100,195 70,130" fill="none" stroke="rgba(255,255,200,0.4)" stroke-width="1.5"/>
  <!-- Inner gem facets -->
  <line x1="100" y1="65" x2="100" y2="195" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="70" y1="130" x2="130" y2="130" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="100" y1="65" x2="70" y2="130" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="100" y1="65" x2="130" y2="130" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Gem highlight -->
  <polygon points="100,65 118,110 100,105 82,110" fill="rgba(255,255,200,0.3)"/>
  <!-- Sparkles around gem -->
  <path d="M 50 70 L 52 64 L 54 70 L 60 72 L 54 74 L 52 80 L 50 74 L 44 72 Z" fill="#ffd700" opacity="0.7"/>
  <path d="M 142 68 L 144 62 L 146 68 L 152 70 L 146 72 L 144 78 L 142 72 L 136 70 Z" fill="#ffd700" opacity="0.6"/>
  <path d="M 35 140 L 37 135 L 39 140 L 44 142 L 39 144 L 37 149 L 35 144 L 30 142 Z" fill="#ffd700" opacity="0.5"/>
  <path d="M 157 142 L 159 137 L 161 142 L 166 144 L 161 146 L 159 151 L 157 146 L 152 144 Z" fill="#ffd700" opacity="0.5"/>
  <text x="100" y="245" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="rgba(212,175,55,0.9)" text-anchor="middle" letter-spacing="3">LEGENDARY</text>
</svg>
